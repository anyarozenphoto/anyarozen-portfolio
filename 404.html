<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        var l = window.location;
        // Путь внутри репозитория, без начального /anyarozen-portfolio
        var path = l.pathname.replace(/^\/anyarozen-portfolio/, "");
        // Собираем целевой URL: корень + оригинальный путь в hash
        var newUrl = l.protocol + "//" + l.host + "/anyarozen-portfolio/#" + path + l.search;
        window.location.replace(newUrl);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
