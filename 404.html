<script>
  (function () {
    var l = window.location;
    var path = l.pathname.replace(/^\/anyarozen-portfolio/, "");

      l.protocol + "//" + l.host + "/anyarozen-portfolio/" + "?" + "redirect=" + encodeURIComponent(path + l.search);
    window.location.replace(newUrl);
  })();
</script>
